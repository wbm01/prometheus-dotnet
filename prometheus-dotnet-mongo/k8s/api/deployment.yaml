apiVersion: apps/v1
kind: Deployment
metadata:
  name:  app
  namespace: default
  labels:
    app:  app
spec:
  selector:
    matchLabels:
      app: app
  replicas: 1
  template:
    metadata:
      labels:
        app:  app
    spec:
      # initContainers:
        # Init containers are exactly like regular containers, except:
          # - Init containers always run to completion.
          # - Each init container must complete successfully before the next one starts.
      containers:
      - name:  app-prometheus
        image:  willianmarioti/app-prometheus:v1
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 100m
            memory: 100Mi
        ports:
        - containerPort:  80
          name:  app-prometheus
      restartPolicy: Always