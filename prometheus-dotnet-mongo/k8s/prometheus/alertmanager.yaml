global:
  resolve_timeout: 5m

route:
  receiver: "default"
  group_wait: 10s
  group_interval: 30s
  repeat_interval: 1h

  routes:
    - match:
        severity: critical
      receiver: "critical"

    - match:
        severity: warning
      receiver: "warning"

receivers:
  - name: "default"

  - name: "critical"
    webhook_configs:
      - url: "http://localhost:8081/alerts"

  - name: "warning"
    webhook_configs:
      - url: "http://localhost:8081/alerts"