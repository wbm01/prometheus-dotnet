global:
  scrape_interval: 15s
  scrape_timeout: 5s
  evaluation_interval: 15s

rule_files:
  - alert.rules

scrape_configs:
  - job_name: "dotnet-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
        labels:
          versao: 1.0.0
    scrape_interval: 5s
    scrape_timeout: 2s

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "mongo_exporter"
    static_configs:
      - targets: ["mongoexporter:9216"]
        labels:
          database: mongo
    scrape_interval: 5s
    scrape_timeout: 2s

alerting:
  alertmanagers:
  - scheme: http
    static_configs:
      - targets: ["alertmanager:9093"]
